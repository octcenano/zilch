Name: Zilch
Summary: Comunicación cifrada P2P offline
Description: |
  Zilch es una aplicación de comunicación cifrada de extremo a extremo
  que funciona SIN conexión a internet. Los mensajes viajan entre
  dispositivos cercanos a través de Bluetooth LE en una red mesh
  descentralizada. No hay servidores, no hay vigilancia, no hay rastro.

  Características principales:
  - Mensajería cifrada P2P por Bluetooth LE
  - Red mesh autónoma sin internet
  - Identidad efímera con auto-regeneración
  - Kill Switch de emergencia
  - Verificación de identidad por QR + fingerprint verbal
  - Base de datos local cifrada con SQLCipher
  - Sin Google Play Services, sin Firebase, sin tracking

Categories:
  - Security
  - Instant Messaging
  - FOSS
License: MIT
SourceCode: https://github.com/octcenano/zilch
IssueTracker: https://github.com/octcenano/zilch/issues
Translation: false

AutoUpdateMode: Version
UpdateCheckMode: Tags

Builds:
  - versionName: 0.1.0-alpha
    versionCode: 1
    commit: v0.1.0-alpha
    subdir: app-ui
    gradle:
      - yes
